services:
  portfolio-web:
    build:
      context: ./apps/portfolio
      dockerfile: Dockerfile
    container_name: cyanisok-portfolio
    environment:
      - AI_CHAT_SERVICE_URL=http://chat-service:80
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      chat-service:
        condition: service_healthy
    restart: unless-stopped

  chat-service:
    build:
      context: ./services/ai-chat-service
      dockerfile: Dockerfile
      target: production
    container_name: cyanisok-ai-chat-service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-chatserver}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:?Set DASHSCOPE_API_KEY in .env}
      - AI_MODEL=${AI_MODEL:-qwen-plus}
      - AI_API_URL=${AI_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      - AI_REQUEST_TIMEOUT_SECONDS=${AI_REQUEST_TIMEOUT_SECONDS:-60}
      - AI_CONNECT_TIMEOUT_SECONDS=${AI_CONNECT_TIMEOUT_SECONDS:-10}
      - AI_STREAM_IDLE_TIMEOUT_SECONDS=${AI_STREAM_IDLE_TIMEOUT_SECONDS:-90}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - HTTP_PORT=80
    expose:
      - "80"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: cyanisok-ai-chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chatserver}
      MYSQL_USER: ${MYSQL_USER:-chatuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatpassword}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/ai-chat-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cyanisok-ai-chat-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    expose:
      - "5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  rabbitmq_data:
