services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: cppaiservice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chatserver}
      MYSQL_USER: ${MYSQL_USER:-chatuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # RabbitMQ 消息队列服务
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cppaiservice-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # 开发服务 - 直接进入 bash 开发
  app_dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: cppaiservice-dev
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-chatserver}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:?Set DASHSCOPE_API_KEY in .env}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - KNOWLEDGE_BASE_ID=${KNOWLEDGE_BASE_ID:-}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - BAIDU_CLIENT_ID=${BAIDU_CLIENT_ID:-}
      - BAIDU_CLIENT_SECRET=${BAIDU_CLIENT_SECRET:-}
      - HTTP_PORT=${HTTP_PORT:-80}
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    profiles:
      - dev

  # 生产服务 - 编译并运行
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cppaiservice
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-chatserver}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:?Set DASHSCOPE_API_KEY in .env}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - KNOWLEDGE_BASE_ID=${KNOWLEDGE_BASE_ID:-}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - BAIDU_CLIENT_ID=${BAIDU_CLIENT_ID:-}
      - BAIDU_CLIENT_SECRET=${BAIDU_CLIENT_SECRET:-}
      - HTTP_PORT=${HTTP_PORT:-80}
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  rabbitmq_data:
