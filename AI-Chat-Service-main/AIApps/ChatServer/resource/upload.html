<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 图像识别助手</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ==================== 布局组件 ==================== */
        .top-bar {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        /* ==================== 消息样式 ==================== */
        .message {
            max-width: 70%;
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.assistant {
            background: #e5e5ea;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .message img {
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin-top: 8px;
        }

        /* ==================== 按钮样式 ==================== */
        .back-btn,
        button[type="submit"] {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        .back-btn:hover,
        button[type="submit"]:hover {
            background: #0056b3;
        }

        input[type="file"] {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- ==================== 顶部导航 ==================== -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='/menu'">← 返回</button>
    </div>

    <!-- ==================== 消息展示区 ==================== -->
    <div class="chat-container" id="chat-container"></div>

    <!-- ==================== 图片上传表单 ==================== -->
    <form class="input-box" id="upload-form">
        <input type="file" id="image-input" accept="image/*" required>
        <button type="submit">发送图片</button>
    </form>

    <script>
    // =============================================================================
    // 后端接口配置
    // =============================================================================
    const API_CONFIG = {
        uploadEndpoint: '/upload/send',  // POST - 上传图片进行识别
    };

    // =============================================================================
    // 请求/响应类型定义（用于理解接口契约）
    // =============================================================================
    // 请求: POST /upload/send
    // {
    //   filename: string,   // 图片文件名
    //   image: string      // Base64 编码的图片数据（不含 data:image/... 前缀）
    // }
    //
    // 响应成功:
    // {
    //   success: "ok",
    //   filename: string,
    //   class_name: string,    // 识别出的类别名称
    //   confidence: number     // 置信度 (0-1)
    // }
    //
    // 响应失败:
    // {
    //   status: "error",
    //   message: string
    // }
    // =============================================================================

    // =============================================================================
    // DOM 元素引用
    // =============================================================================
    const chatContainer = document.getElementById('chat-container');
    const uploadForm = document.getElementById('upload-form');
    const imageInput = document.getElementById('image-input');

    // =============================================================================
    // 渲染函数
    // =============================================================================
    function appendMessage(role, content, imageUrl = null) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', role);
        msgDiv.innerHTML = `<b>${role === 'user' ? '你' : 'AI'}:</b> ${content}`;

        if (imageUrl) {
            const img = document.createElement('img');
            img.src = imageUrl;
            msgDiv.appendChild(img);
        }

        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // =============================================================================
    // 业务逻辑
    // =============================================================================
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!imageInput.files.length) return;

        const file = imageInput.files[0];

        // FileReader 将图片转为 Base64
        const base64Url = await readFileAsDataUrl(file);
        const base64Data = base64Url.split(',')[1];

        // 显示用户上传的图片预览
        appendMessage('user', `已上传图片: ${file.name}`, base64Url);

        // 构建请求体（注意：这里明确标注了传给后端的字段）
        const requestPayload = {
            filename: file.name,    // → 后端: filename
            image: base64Data       // → 后端: image (Base64)
        };

        try {
            // 调用后端接口
            const response = await fetch(API_CONFIG.uploadEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestPayload)
            });

            if (!response.ok) throw new Error('上传失败');

            const responseData = await response.json();

            // 解析响应（注意：这里明确标注了从后端返回的字段）
            const resultText = `识别结果: ${responseData.class_name} (置信度: ${Math.round(responseData.confidence * 100)}%)`;
            appendMessage('assistant', resultText);

        } catch (err) {
            appendMessage('assistant', `[错误] 无法连接到服务器或上传失败: ${err.message}`);
        }

        imageInput.value = '';
    });

    // =============================================================================
    // 工具函数
    // =============================================================================
    function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    </script>
</body>
</html>
