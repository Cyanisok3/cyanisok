<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 聊天助手</title>
    <!-- 引入 Markdown 解析库和安全过滤库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
    <style>
        /* ==================== 布局组件 ==================== */
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        /* ==================== 消息样式 ==================== */
        .message {
            max-width: 70%;
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.assistant {
            background: #e5e5ea;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        /* ==================== 按钮样式 ==================== */
        .back-btn, .sync-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        .back-btn:hover, .sync-btn:hover {
            background: #0056b3;
        }

        /* ==================== 输入框样式 ==================== */
        textarea {
            flex: 1;
            resize: none;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            outline: none;
        }

        button[type="submit"] {
            margin-left: 10px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <!-- ==================== 顶部导航 ==================== -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='/menu'">← 返回</button>
        <button class="sync-btn" id="sync-history-btn">同步历史数据</button>
    </div>

    <!-- ==================== 消息展示区 ==================== -->
    <div class="chat-container" id="chat-container"></div>

    <!-- ==================== 聊天输入框 ==================== -->
    <form class="input-box" id="chat-form">
        <textarea id="question" placeholder="请输入你的问题..." required></textarea>
        <button type="submit">发送</button>
    </form>

    <script>
    // =============================================================================
    // 后端接口配置
    // =============================================================================
    const API_CONFIG = {
        sendEndpoint: '/chat/send',     // POST - 发送聊天消息
        historyEndpoint: '/chat/history',  // POST - 获取聊天历史
    };

    // =============================================================================
    // 请求/响应类型定义
    // =============================================================================
    // POST /chat/send
    // 请求: { question: string }  // 用户输入的问题
    // 响应成功: { success: true, information: string }  // AI 回复内容
    // 响应失败: { success: false, message: string }
    //
    // POST /chat/history
    // 请求: {}  // 空对象
    // 响应成功: {
    //   success: true,
    //   history: Array<{ is_user: boolean, content: string }>
    // }
    //       is_user: true = 用户消息, false = AI 消息
    // 响应失败: { success: false, message: string }
    // =============================================================================

    // =============================================================================
    // DOM 元素引用
    // =============================================================================
    const chatContainer = document.getElementById('chat-container');
    const chatForm = document.getElementById('chat-form');
    const questionInput = document.getElementById('question');
    const syncBtn = document.getElementById('sync-history-btn');

    // =============================================================================
    // 渲染函数
    // =============================================================================

    /**
     * 渲染消息到页面（支持 Markdown）
     * @param {string} role - 'user' | 'assistant'
     * @param {string} content - 消息内容
     */
    function appendMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', role);

        // Markdown 转 HTML，并清理 XSS
        const safeHtml = DOMPurify.sanitize(marked.parse(content));

        msgDiv.innerHTML = `<b>${role === 'user' ? '你' : 'AI'}:</b><br>${safeHtml}`;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    /**
     * 清空所有消息
     */
    function clearMessages() {
        chatContainer.innerHTML = '';
    }

    // =============================================================================
    // 业务逻辑 - 发送消息
    // =============================================================================
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = questionInput.value.trim();
        if (!question) return;

        // 显示用户消息
        appendMessage('user', question);
        questionInput.value = '';

        // 构建请求体
        const requestPayload = {
            question: question   // → 后端: question
        };

        try {
            const response = await fetch(API_CONFIG.sendEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestPayload)
            });

            const data = await response.json();

            if (data.success) {
                // ← 后端返回: information（AI 回复内容）
                appendMessage('assistant', data.information || data.Information || '');
            } else {
                appendMessage('assistant', '[错误] ' + (data.message || '未知错误'));
            }
        } catch (err) {
            console.error(err);
            appendMessage('assistant', '[错误] 无法连接到服务器');
        }
    });

    // =============================================================================
    // 业务逻辑 - 同步历史数据
    // =============================================================================
    syncBtn.addEventListener('click', async () => {
        try {
            const response = await fetch(API_CONFIG.historyEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})  // 请求体为空对象
            });

            const data = await response.json();

            if (data.success && Array.isArray(data.history)) {
                clearMessages();
                // ← 后端返回: history 数组
                data.history.forEach(item => {
                    // item.is_user: true = 用户消息, false = AI 消息
                    appendMessage(item.is_user ? 'user' : 'assistant', item.content);
                });
            } else {
                alert('[错误] 无法获取历史数据');
            }
        } catch (err) {
            console.error(err);
            alert('[错误] 请求历史数据失败');
        }
    });
    </script>
</body>
</html>
